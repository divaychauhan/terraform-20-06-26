<!DOCTYPE html>
<html>
<head>
    <title>Cloud Run Revision v2 AGAIN AGAIN</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fb;
            text-align: center;
            padding-top: 80px;
        }

        h1 {
            color: #1a73e8;
        }

        button {
            padding: 12px 25px;
            font-size: 16px;
            cursor: pointer;
        }

        #result {
            margin-top: 25px;
            font-size: 18px;
            color: red;
        }
    </style>
</head>
<body>

    <h1>Cloud Run Revision v2</h1>
    <h2>Testing Revision and Timeout Error</h2>

    <p>This page is updated to create a new Cloud Run revision.</p>

    <button onclick="testTimeout()">Test Timeout Error</button>

    <div id="result"></div>

    <script>
        async function testTimeout() {
            document.getElementById("result").innerHTML =
                "Request started... waiting for slow response...";

            try {
                const response = await fetch("/slow");
                const data = await response.text();

                document.getElementById("result").innerHTML = data;
            } catch (error) {
                document.getElementById("result").innerHTML =
                    "Timeout Error / Request Failed";
            }
        }
    </script>

</body>
</html>
